<body>
<div id="root"><div style="background: var(--black); min-height: 100vh;"><div style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 24px; position: relative; overflow: hidden;"><div style="position: absolute; top: -15%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(200, 255, 94, 0.07) 0%, transparent 65%); pointer-events: none; animation: 7s ease-in-out 0s infinite normal none running pulse;"></div><div style="position: absolute; bottom: -15%; left: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(200, 255, 94, 0.04) 0%, transparent 65%); pointer-events: none; animation: 9s ease-in-out 0s infinite reverse none running pulse;"></div><div class="fade-up" style="text-align: center; max-width: 600px; position: relative;"><div style="margin-bottom: 28px;"><div style="font-family: Syne, sans-serif; font-weight: 800; font-size: 22px;">pixel<span style="color: rgb(200, 255, 94);">dayz</span></div></div><span style="background: rgba(200, 255, 94, 0.12); color: rgb(200, 255, 94); border-radius: 100px; padding: 3px 11px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; display: inline-block;">✦ AI-powered dagplanning</span><h1 style="font-family: Syne, sans-serif; font-weight: 800; font-size: clamp(2.6rem, 8vw, 5rem); line-height: 0.95; letter-spacing: -0.03em; margin: 24px 0px;">Stop met plannen.<br><span style="color: rgb(200, 255, 94);">Begin met doen.</span></h1><p style="color: var(--muted); line-height: 1.7; font-size: 1rem; max-width: 420px; margin: 0px auto 40px;">Gooi je taken erin. Onze AI bouwt jouw optimale dagschema — op basis van prioriteit, energie en tijd.</p><button style="background: rgb(200, 255, 94); color: rgb(10, 10, 10); border: none; border-radius: 100px; padding: 16px 44px; font-family: Syne, sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: rgba(200, 255, 94, 0.25) 0px 0px 40px; transition: transform 0.2s, box-shadow 0.2s;">Mijn dag plannen →</button><div style="margin-top: 48px; display: flex; justify-content: center; gap: 36px; flex-wrap: wrap;"><div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted);"><span>🧠</span>AI begrijpt context</div><div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted);"><span>⚡</span>Schema in seconden</div><div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted);"><span>🔄</span>Herplant automatisch</div></div></div></div></div></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const ACCENT = "#c8ff5e";

// ── Small components ──────────────────────────────────────────────────────────
const Tag = ({ children, green }) => (
  <span style={{
    background: green ? "rgba(200,255,94,0.12)" : "rgba(255,255,255,0.06)",
    color: green ? ACCENT : "#888",
    borderRadius: 100, padding: "3px 11px", fontSize: 11, fontWeight: 500,
    letterSpacing: "0.04em", display: "inline-block"
  }}>{children}</span>
);

const Logo = () => (
  <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22 }}>
    pixel<span style={{ color: ACCENT }}>dayz</span>
  </div>
);

// ── Input styles ──────────────────────────────────────────────────────────────
const inp = {
  background: "var(--card2)", border: "1px solid var(--border)", borderRadius: 10,
  color: "var(--white)", fontFamily: "'DM Sans',sans-serif", fontSize: "0.9rem",
  padding: "10px 14px", outline: "none", width: "100%", transition: "border-color 0.2s"
};

// ── SCREEN 1: Landing ─────────────────────────────────────────────────────────
function Landing({ onStart }) {
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", padding: "40px 24px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: "-15%", right: "-10%", width: 600, height: 600, background: "radial-gradient(circle, rgba(200,255,94,0.07) 0%, transparent 65%)", pointerEvents: "none", animation: "pulse 7s ease-in-out infinite" }} />
      <div style={{ position: "absolute", bottom: "-15%", left: "-10%", width: 400, height: 400, background: "radial-gradient(circle, rgba(200,255,94,0.04) 0%, transparent 65%)", pointerEvents: "none", animation: "pulse 9s ease-in-out infinite reverse" }} />

      <div className="fade-up" style={{ textAlign: "center", maxWidth: 600, position: "relative" }}>
        <div style={{ marginBottom: 28 }}><Logo /></div>
        <Tag green>✦ AI-powered dagplanning</Tag>
        <h1 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: "clamp(2.6rem,8vw,5rem)", lineHeight: 0.95, letterSpacing: "-0.03em", margin: "24px 0" }}>
          Stop met plannen.<br /><span style={{ color: ACCENT }}>Begin met doen.</span>
        </h1>
        <p style={{ color: "var(--muted)", lineHeight: 1.7, fontSize: "1rem", maxWidth: 420, margin: "0 auto 40px" }}>
          Gooi je taken erin. Onze AI bouwt jouw optimale dagschema — op basis van prioriteit, energie en tijd.
        </p>
        <button onClick={onStart} style={{
          background: ACCENT, color: "#0a0a0a", border: "none", borderRadius: 100,
          padding: "16px 44px", fontFamily: "'Syne',sans-serif", fontWeight: 700,
          fontSize: "1rem", cursor: "pointer", boxShadow: "0 0 40px rgba(200,255,94,0.25)",
          transition: "transform 0.2s, box-shadow 0.2s"
        }}
          onMouseOver={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 0 60px rgba(200,255,94,0.4)"; }}
          onMouseOut={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 0 40px rgba(200,255,94,0.25)"; }}>
          Mijn dag plannen →
        </button>
        <div style={{ marginTop: 48, display: "flex", justifyContent: "center", gap: 36, flexWrap: "wrap" }}>
          {[["🧠","AI begrijpt context"],["⚡","Schema in seconden"],["🔄","Herplant automatisch"]].map(([icon,label]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: "0.85rem", color: "var(--muted)" }}>
              <span>{icon}</span>{label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SCREEN 2: Input ───────────────────────────────────────────────────────────
function TaskInput({ onGenerate }) {
  const [tasks, setTasks] = useState([{ id: 1, text: "", priority: "high", duration: 60 }]);
  const [wakeTime, setWakeTime] = useState("09:00");
  const [energy, setEnergy] = useState("ochtend");
  const [mode, setMode] = useState("structured");
  const [freeText, setFreeText] = useState("");

  const addTask = () => setTasks(t => [...t, { id: Date.now(), text: "", priority: "medium", duration: 30 }]);
  const removeTask = id => setTasks(t => t.filter(x => x.id !== id));
  const updateTask = (id, f, v) => setTasks(t => t.map(x => x.id === id ? { ...x, [f]: v } : x));

  const pColor = { high: "#ff6b6b", medium: "#ffd166", low: "#6bcb77" };

  const handleSubmit = () => {
    if (mode === "freetext") { if (!freeText.trim()) return; onGenerate({ freeText, wakeTime, energy, mode: "freetext" }); }
    else { const filled = tasks.filter(t => t.text.trim()); if (!filled.length) return; onGenerate({ tasks: filled, wakeTime, energy, mode: "structured" }); }
  };

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "52px 24px 80px" }}>
      <div style={{ marginBottom: 36 }}>
        <Logo />
        <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: "clamp(1.6rem,4vw,2.2rem)", letterSpacing: "-0.03em", marginTop: 20 }}>
          Wat staat er vandaag op de agenda?
        </h2>
        <p style={{ color: "var(--muted)", marginTop: 8, fontSize: "0.9rem" }}>Gooi alles erin — de AI maakt er een slim schema van.</p>
      </div>

      {/* Mode toggle */}
      <div style={{ display: "flex", gap: 6, marginBottom: 28, background: "var(--card)", borderRadius: 12, padding: 4, width: "fit-content" }}>
        {[["structured","📋 Taken invoeren"],["freetext","💬 Vrijuit typen"]].map(([m,label]) => (
          <button key={m} onClick={() => setMode(m)} style={{
            background: mode===m ? "var(--card2)" : "transparent",
            border: mode===m ? "1px solid var(--border)" : "1px solid transparent",
            color: mode===m ? "var(--white)" : "var(--muted)",
            borderRadius: 8, padding: "8px 16px", fontSize: "0.82rem",
            cursor: "pointer", fontFamily: "'DM Sans',sans-serif", transition: "all 0.2s"
          }}>{label}</button>
        ))}
      </div>

      {/* Settings */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 24 }}>
        <div>
          <label style={{ fontSize: "0.72rem", color: "var(--muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8, display: "block" }}>Starttijd</label>
          <input type="time" value={wakeTime} onChange={e => setWakeTime(e.target.value)} style={{ ...inp, colorScheme: "dark" }} />
        </div>
        <div>
          <label style={{ fontSize: "0.72rem", color: "var(--muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8, display: "block" }}>Energiepiek</label>
          <select value={energy} onChange={e => setEnergy(e.target.value)} style={inp}>
            <option value="ochtend">🌅 Ochtend</option>
            <option value="middag">☀️ Middag</option>
            <option value="avond">🌙 Avond</option>
          </select>
        </div>
      </div>

      {mode === "freetext" ? (
        <div style={{ marginBottom: 24 }}>
          <label style={{ fontSize: "0.72rem", color: "var(--muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8, display: "block" }}>Beschrijf je dag</label>
          <textarea value={freeText} onChange={e => setFreeText(e.target.value)}
            placeholder="Bijv: Ik moet een rapport afmaken voor 17u, een meeting van 10-11, boodschappen doen en liefst ook sporten..."
            style={{ ...inp, minHeight: 150, resize: "vertical", lineHeight: 1.6 }} />
        </div>
      ) : (
        <div style={{ marginBottom: 24 }}>
          <label style={{ fontSize: "0.72rem", color: "var(--muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8, display: "block" }}>Jouw taken</label>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {tasks.map((task, i) => (
              <div key={task.id} style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: 8, alignItems: "center" }}>
                <input value={task.text} onChange={e => updateTask(task.id, "text", e.target.value)}
                  placeholder={`Taak ${i+1}...`} style={inp}
                  onFocus={e => e.target.style.borderColor = "rgba(200,255,94,0.35)"}
                  onBlur={e => e.target.style.borderColor = "var(--border)"} />
                <select value={task.priority} onChange={e => updateTask(task.id, "priority", e.target.value)}
                  style={{ ...inp, width: "auto", color: pColor[task.priority], paddingLeft: 10 }}>
                  <option value="high">🔴 Hoog</option>
                  <option value="medium">🟡 Middel</option>
                  <option value="low">🟢 Laag</option>
                </select>
                <select value={task.duration} onChange={e => updateTask(task.id, "duration", Number(e.target.value))}
                  style={{ ...inp, width: "auto" }}>
                  {[15,30,45,60,90,120].map(d => <option key={d} value={d}>{d}m</option>)}
                </select>
                {tasks.length > 1 && (
                  <button onClick={() => removeTask(task.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 20, padding: "0 4px", lineHeight: 1 }}>×</button>
                )}
              </div>
            ))}
          </div>
          <button onClick={addTask} style={{
            marginTop: 10, background: "none", border: "1px dashed var(--border)",
            color: "var(--muted)", borderRadius: 10, padding: "10px 20px",
            fontSize: "0.85rem", cursor: "pointer", width: "100%",
            fontFamily: "'DM Sans',sans-serif", transition: "all 0.2s"
          }}
            onMouseOver={e => { e.currentTarget.style.borderColor = ACCENT; e.currentTarget.style.color = ACCENT; }}
            onMouseOut={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--muted)"; }}>
            + Taak toevoegen
          </button>
        </div>
      )}

      <button onClick={handleSubmit} style={{
        width: "100%", background: ACCENT, color: "#0a0a0a", border: "none",
        borderRadius: 12, padding: "16px", fontFamily: "'Syne',sans-serif",
        fontWeight: 700, fontSize: "1rem", cursor: "pointer",
        boxShadow: "0 0 30px rgba(200,255,94,0.2)", transition: "transform 0.2s, box-shadow 0.2s"
      }}
        onMouseOver={e => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 0 50px rgba(200,255,94,0.35)"; }}
        onMouseOut={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 0 30px rgba(200,255,94,0.2)"; }}>
        ✦ Genereer mijn dagschema
      </button>
    </div>
  );
}

// ── SCREEN 3: Loading ─────────────────────────────────────────────────────────
function Loading() {
  const [step, setStep] = useState(0);
  const steps = ["Taken analyseren...","Prioriteiten bepalen...","Energiepiek verwerken...","Schema optimaliseren...","Bijna klaar..."];
  useEffect(() => {
    const iv = setInterval(() => setStep(s => Math.min(s+1, steps.length-1)), 850);
    return () => clearInterval(iv);
  }, []);
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 28 }}>
      <div style={{ position: "relative", width: 80, height: 80 }}>
        <div style={{ position: "absolute", inset: 0, borderRadius: "50%", border: `2px solid ${ACCENT}`, borderTopColor: "transparent", animation: "spin 0.9s linear infinite" }} />
        <div style={{ position: "absolute", inset: 10, borderRadius: "50%", border: "1px solid rgba(200,255,94,0.2)", borderBottomColor: "transparent", animation: "spin 1.4s linear infinite reverse" }} />
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>✦</div>
      </div>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: "1.1rem", color: ACCENT, marginBottom: 8 }}>AI aan het werk</div>
        <div style={{ color: "var(--muted)", fontSize: "0.9rem" }}>{steps[step]}</div>
      </div>
    </div>
  );
}

// ── SCREEN 4: Schedule ────────────────────────────────────────────────────────
function Schedule({ schedule, onReset, onRegenerate }) {
  const [done, setDone] = useState({});
  const toggle = i => setDone(d => ({ ...d, [i]: !d[i] }));
  const total = schedule.blocks?.length || 0;
  const doneCount = Object.values(done).filter(Boolean).length;
  const progress = total ? Math.round((doneCount / total) * 100) : 0;

  const typeColor = t => ({ focus: ACCENT, meeting: "#ffd166", break: "#6bcb77", admin: "#74b3ce" }[t] || "#888");
  const typeLabel = t => ({ focus: "🎯 Focus", meeting: "👥 Meeting", break: "☕ Pauze", admin: "📋 Admin" }[t] || t);

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "48px 24px 80px" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32, flexWrap: "wrap", gap: 12 }}>
        <div>
          <Logo />
          <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: "clamp(1.4rem,4vw,2rem)", letterSpacing: "-0.02em", marginTop: 16 }}>Jouw dagschema</h2>
          <p style={{ color: "var(--muted)", fontSize: "0.83rem", marginTop: 4 }}>
            {new Date().toLocaleDateString("nl-BE", { weekday: "long", day: "numeric", month: "long" })}
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onRegenerate} style={{ background: "var(--card)", border: "1px solid var(--border)", color: "var(--muted)", borderRadius: 8, padding: "8px 14px", fontSize: "0.82rem", cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>↺ Herplan</button>
          <button onClick={onReset} style={{ background: "var(--card)", border: "1px solid var(--border)", color: "var(--muted)", borderRadius: 8, padding: "8px 14px", fontSize: "0.82rem", cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>+ Nieuwe dag</button>
        </div>
      </div>

      {/* Progress */}
      <div style={{ background: "var(--card)", borderRadius: 12, padding: "16px 20px", marginBottom: 24, border: "1px solid var(--border)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: "0.82rem", color: "var(--muted)" }}>Voortgang vandaag</span>
          <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, color: ACCENT }}>{progress}%</span>
        </div>
        <div style={{ height: 6, background: "#1a1a1a", borderRadius: 3 }}>
          <div style={{ height: "100%", width: `${progress}%`, background: ACCENT, borderRadius: 3, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ marginTop: 8, fontSize: "0.78rem", color: "var(--muted)" }}>{doneCount} van {total} blokken afgerond</div>
      </div>

      {/* AI Tip */}
      {schedule.dailyTip && (
        <div style={{ background: "rgba(200,255,94,0.06)", border: "1px solid rgba(200,255,94,0.18)", borderRadius: 12, padding: "14px 18px", marginBottom: 24, display: "flex", gap: 12 }}>
          <span style={{ fontSize: 18, flexShrink: 0 }}>✦</span>
          <div>
            <div style={{ fontSize: "0.72rem", color: ACCENT, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 4 }}>AI-tip</div>
            <div style={{ fontSize: "0.87rem", color: "#ccc", lineHeight: 1.55 }}>{schedule.dailyTip}</div>
          </div>
        </div>
      )}

      {/* Summary chips */}
      {schedule.summary && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
          {schedule.summary.totalFocusTime && <Tag green>🎯 {schedule.summary.totalFocusTime} focustijd</Tag>}
          {schedule.summary.breaks && <Tag>☕ {schedule.summary.breaks} pauzes</Tag>}
          {schedule.summary.bufferTime && <Tag>🛡 {schedule.summary.bufferTime} buffer</Tag>}
        </div>
      )}

      {/* Blocks */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {schedule.blocks?.map((block, i) => (
          <div key={i} onClick={() => toggle(i)} style={{
            background: done[i] ? "rgba(255,255,255,0.02)" : "var(--card)",
            border: `1px solid ${done[i] ? "rgba(255,255,255,0.04)" : "var(--border)"}`,
            borderLeft: `3px solid ${done[i] ? "transparent" : typeColor(block.type)}`,
            borderRadius: 14, padding: "16px 20px", cursor: "pointer",
            display: "grid", gridTemplateColumns: "56px 1fr 28px",
            gap: 16, alignItems: "center",
            opacity: done[i] ? 0.45 : 1, transition: "all 0.25s"
          }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: "0.88rem" }}>{block.startTime}</div>
              <div style={{ fontSize: "0.68rem", color: "var(--muted)", marginTop: 2 }}>{block.duration}m</div>
            </div>
            <div>
              <div style={{ fontWeight: 500, fontSize: "0.95rem", textDecoration: done[i] ? "line-through" : "none", marginBottom: 4 }}>{block.title}</div>
              {block.description && <div style={{ fontSize: "0.8rem", color: "var(--muted)", lineHeight: 1.45, marginBottom: 6 }}>{block.description}</div>}
              <Tag green={block.type === "focus"}>{typeLabel(block.type)}</Tag>
            </div>
            <div style={{ fontSize: 18, color: done[i] ? ACCENT : "var(--muted)", textAlign: "center" }}>{done[i] ? "✓" : "○"}</div>
          </div>
        ))}
      </div>

      {/* Completed state */}
      {doneCount === total && total > 0 && (
        <div style={{ textAlign: "center", marginTop: 40, padding: "36px", background: "rgba(200,255,94,0.05)", border: "1px solid rgba(200,255,94,0.2)", borderRadius: 16 }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>🎉</div>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: "1.4rem", color: ACCENT, marginBottom: 8 }}>Dag voltooid!</div>
          <div style={{ color: "var(--muted)", fontSize: "0.9rem" }}>Geweldig gedaan. Alle blokken zijn afgevinkt.</div>
        </div>
      )}
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("landing");
  const [schedule, setSchedule] = useState(null);
  const [lastInput, setLastInput] = useState(null);

  const generate = async (data) => {
    setLastInput(data);
    setScreen("loading");

    const userMsg = data.mode === "freetext"
      ? `De gebruiker beschrijft zijn dag: "${data.freeText}"\nStarttijd: ${data.wakeTime}, Energiepiek: ${data.energy}`
      : `De gebruiker heeft deze taken:\n${data.tasks.map(t=>`- ${t.text} (prioriteit: ${t.priority}, duur: ${t.duration} min)`).join("\n")}\nStarttijd: ${data.wakeTime}, Energiepiek: ${data.energy}`;

    const systemPrompt = `Je bent een AI dagplanner. Maak een realistisch dagschema op basis van de input.
Voeg automatisch pauzes en buffers toe. Plan zware taken op het energiepiek-moment.
Antwoord UITSLUITEND met geldig JSON in dit formaat, geen tekst eromheen, geen markdown:
{
  "blocks": [
    { "startTime": "09:00", "duration": 90, "title": "Taaknaam", "description": "Korte uitleg waarom nu", "type": "focus" }
  ],
  "summary": { "totalFocusTime": "2u30m", "breaks": "2", "bufferTime": "30m" },
  "dailyTip": "Een concrete, persoonlijke tip voor vandaag"
}
Types: focus, meeting, break, admin`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: userMsg }]
        })
      });
      const json = await res.json();
      const raw = (json.content || []).map(c => c.text || "").join("");
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setSchedule(parsed);
      setScreen("schedule");
    } catch (err) {
      // Fallback demo schedule
      const [h, m] = data.wakeTime.split(":").map(Number);
      const addMin = (base, mins) => {
        const total = base + mins;
        return `${String(Math.floor(total/60)).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
      };
      const start = h * 60 + m;
      setSchedule({
        blocks: [
          { startTime: addMin(start, 0), duration: 15, title: "Dag opstarten", description: "E-mails scannen, prioriteiten checken", type: "admin" },
          { startTime: addMin(start, 15), duration: 90, title: data.mode === "structured" && data.tasks[0] ? data.tasks[0].text : "Belangrijkste taak", description: "Diep focuswerk — meldingen uit", type: "focus" },
          { startTime: addMin(start, 105), duration: 15, title: "Korte pauze", description: "Beweeg even, frisse lucht", type: "break" },
          { startTime: addMin(start, 120), duration: 60, title: data.mode === "structured" && data.tasks[1] ? data.tasks[1].text : "Tweede prioriteit", description: "Energie nog hoog — maak er gebruik van", type: "focus" },
          { startTime: addMin(start, 180), duration: 60, title: "Lunch", description: "Volledig offline ontspannen", type: "break" },
          { startTime: addMin(start, 240), duration: 45, title: "E-mails & communicatie", description: "Alle berichten in één blok", type: "admin" },
          { startTime: addMin(start, 285), duration: 60, title: "Overige taken", description: "Resterende items van de lijst", type: "focus" },
          { startTime: addMin(start, 345), duration: 15, title: "Dag afsluiten", description: "To-do voor morgen klaarzetten", type: "admin" },
        ],
        summary: { totalFocusTime: "2u30m", breaks: "2", bufferTime: "15m" },
        dailyTip: "Plan je moeilijkste taak als eerste — je wilskracht is 's ochtends het sterkst."
      });
      setScreen("schedule");
    }
  };

  return (
    <div style={{ background: "var(--black)", minHeight: "100vh" }}>
      {screen === "landing" && <Landing onStart={() => setScreen("input")} />}
      {screen === "input" && <TaskInput onGenerate={generate} />}
      {screen === "loading" && <Loading />}
      {screen === "schedule" && <Schedule schedule={schedule} onReset={() => setScreen("input")} onRegenerate={() => lastInput && generate(lastInput)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Pixeldayz PWA ready'))
        .catch(err => console.log('SW error:', err));
    });
  }

  // Install prompt for Android
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'flex';
  });

  window.installApp = () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        const banner = document.getElementById('install-banner');
        if (banner) banner.style.display = 'none';
      });
    }
  };
</script>
