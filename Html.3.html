  // noop - babel handles this

<script type="text/babel">
const{useState,useEffect}=React;
const ACCENT="#c8ff5e";
const SUPA_URL="https://ppnacrosrwplddbtczmc.supabase.co";
const SUPA_KEY="sb_publishable_UO04BMwREjF_cfnzSn9A-w_cwdKYRYL";

// Safe supabase init
let sb = null;
try {
  if(window.supabase) sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
} catch(e) {}

const Tag=({children,green})=><span style={{background:green?"rgba(200,255,94,0.12)":"rgba(255,255,255,0.06)",color:green?ACCENT:"#888",borderRadius:100,padding:"3px 11px",fontSize:11,fontWeight:500,letterSpacing:"0.04em",display:"inline-block"}}>{children}</span>;
const Logo=()=><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22}}>pixel<span style={{color:ACCENT}}>dayz</span></div>;
const inp={background:"var(--card2)",border:"1px solid var(--border)",borderRadius:10,color:"var(--white)",fontFamily:"'DM Sans',sans-serif",fontSize:"0.9rem",padding:"10px 14px",outline:"none",width:"100%",transition:"border-color 0.2s"};

function AuthScreen({onAuth,onSkip}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");
  const handle=async()=>{
    if(!sb){setError("Login tijdelijk niet beschikbaar. Probeer opnieuw.");return;}
    setError("");setSuccess("");setLoading(true);
    try{
      if(mode==="signup"){
        const{error}=await sb.auth.signUp({email,password});
        if(error)throw error;
        setSuccess("✓ Check je e-mail om je account te bevestigen!");
      }else{
        const{data,error}=await sb.auth.signInWithPassword({email,password});
        if(error)throw error;
        onAuth(data.user);
      }
    }catch(e){setError(e.message==="Invalid login credentials"?"Verkeerd e-mailadres of wachtwoord.":e.message);}
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"40px 24px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"-20%",right:"-10%",width:500,height:500,background:"radial-gradient(circle,rgba(200,255,94,0.06) 0%,transparent 65%)",pointerEvents:"none",animation:"pulse 7s ease-in-out infinite"}}/>
      <div className="fade-up" style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:40}}><Logo/><p style={{color:"var(--muted)",marginTop:8,fontSize:"0.9rem"}}>{mode==="login"?"Welkom terug 👋":"Maak je account aan"}</p></div>
        <div style={{display:"flex",gap:6,marginBottom:28,background:"var(--card)",borderRadius:12,padding:4}}>
          {[["login","Inloggen"],["signup","Aanmelden"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setError("");setSuccess("");}} style={{flex:1,background:mode===m?"var(--card2)":"transparent",border:mode===m?"1px solid var(--border)":"1px solid transparent",color:mode===m?"var(--white)":"var(--muted)",borderRadius:8,padding:"9px 16px",fontSize:"0.85rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="jouw@email.be" style={inp} onFocus={e=>e.target.style.borderColor="rgba(200,255,94,0.35)"} onBlur={e=>e.target.style.borderColor="var(--border)"} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Wachtwoord" style={inp} onFocus={e=>e.target.style.borderColor="rgba(200,255,94,0.35)"} onBlur={e=>e.target.style.borderColor="var(--border)"} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        {error&&<div style={{background:"rgba(255,80,80,0.08)",border:"1px solid rgba(255,80,80,0.2)",borderRadius:10,padding:"10px 14px",fontSize:"0.85rem",color:"#ff8080",marginBottom:16}}>{error}</div>}
        {success&&<div style={{background:"rgba(200,255,94,0.08)",border:"1px solid rgba(200,255,94,0.2)",borderRadius:10,padding:"10px 14px",fontSize:"0.85rem",color:ACCENT,marginBottom:16}}>{success}</div>}
        <button onClick={handle} disabled={loading} style={{width:"100%",background:ACCENT,color:"#0a0a0a",border:"none",borderRadius:12,padding:"15px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,transition:"all 0.2s"}}>
          {loading?"Even wachten...":mode==="login"?"Inloggen →":"Account aanmaken →"}
        </button>
        <p style={{textAlign:"center",marginTop:16,fontSize:"0.8rem",color:"var(--muted)"}}>
          {mode==="login"?"Nog geen account? ":"Al een account? "}
          <span onClick={()=>{setMode(mode==="login"?"signup":"login");setError("");setSuccess("");}} style={{color:ACCENT,cursor:"pointer",textDecoration:"underline"}}>{mode==="login"?"Aanmaken":"Inloggen"}</span>
        </p>
        <p style={{textAlign:"center",marginTop:12,fontSize:"0.8rem"}}>
          <span onClick={onSkip} style={{color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}}>Doorgaan zonder account</span>
        </p>
      </div>
    </div>
  );
}

function Landing({onStart}){

        <div style={{marginBottom:28}}><Logo/></div>

        <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"clamp(2.6rem,8vw,5rem)",lineHeight:0.95,letterSpacing:"-0.03em",margin:"24px 0"}}>Stop met plannen.<br/><span style={{color:ACCENT}}>Begin met doen.</span></h1>
        <p style={{color:"var(--muted)",lineHeight:1.7,fontSize:"1rem",maxWidth:420,margin:"0 auto 40px"}}>Gooi je taken erin. Onze AI bouwt jouw optimale dagschema — op basis van prioriteit, energie en tijd.</p>
        <button onClick={onStart} style={{background:ACCENT,color:"#0a0a0a",border:"none",borderRadius:100,padding:"16px 44px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",cursor:"pointer",boxShadow:"0 0 40px rgba(200,255,94,0.25)",transition:"transform 0.2s,box-shadow 0.2s"}} onMouseOver={e=>{e.currentTarget.style.transform="translateY(-2px)";}} onMouseOut={e=>{e.currentTarget.style.transform="";}}>Mijn dag plannen →</button>
        <div style={{marginTop:48,display:"flex",justifyContent:"center",gap:36,flexWrap:"wrap"}}>
          {[["🧠","AI begrijpt context"],["⚡","Schema in seconden"],["🔄","Herplant automatisch"]].map(([icon,label])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:8,fontSize:"0.85rem",color:"var(--muted)"}}><span>{icon}</span>{label}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

function TaskInput({onGenerate,user,onLogout}){
  const[tasks,setTasks]=useState([{id:1,text:"",priority:"high",duration:60}]);
  const[wakeTime,setWakeTime]=useState("09:00");
  const[energy,setEnergy]=useState("ochtend");
  const[mode,setMode]=useState("structured");
  const[freeText,setFreeText]=useState("");
  const[history,setHistory]=useState([]);
  const[showHistory,setShowHistory]=useState(false);
  useEffect(()=>{
    if(user&&sb){
      sb.from("schedules").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(5).then(({data})=>{if(data)setHistory(data);});
    }
  },[user]);
  const addTask=()=>setTasks(t=>[...t,{id:Date.now(),text:"",priority:"medium",duration:30}]);
  const removeTask=id=>setTasks(t=>t.filter(x=>x.id!==id));
  const updateTask=(id,f,v)=>setTasks(t=>t.map(x=>x.id===id?{...x,[f]:v}:x));
  const pColor={high:"#ff6b6b",medium:"#ffd166",low:"#6bcb77"};
  const handleSubmit=()=>{
    if(mode==="freetext"){if(!freeText.trim())return;onGenerate({freeText,wakeTime,energy,mode:"freetext"});}
    else{const filled=tasks.filter(t=>t.text.trim());if(!filled.length)return;onGenerate({tasks:filled,wakeTime,energy,mode:"structured"});}
  };
  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"40px 24px 80px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:32,flexWrap:"wrap",gap:10}}>
        <Logo/>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {user&&<span style={{fontSize:"0.78rem",color:"var(--muted)",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</span>}
          {user&&history.length>0&&<button onClick={()=>setShowHistory(!showHistory)} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:8,padding:"6px 12px",fontSize:"0.78rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>📋 Historie</button>}
          {user&&<button onClick={onLogout} style={{background:"none",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:8,padding:"6px 12px",fontSize:"0.78rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Uitloggen</button>}
        </div>
      </div>
      {showHistory&&history.length>0&&(
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:20,marginBottom:24}}>
          <div style={{fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:12}}>Recente schema's</div>
          {history.map(h=>(
            <div key={h.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"var(--card2)",borderRadius:10,fontSize:"0.85rem",marginBottom:6}}>
              <span>{h.title||"Schema"}</span>
              <span style={{color:"var(--muted)",fontSize:"0.75rem"}}>{new Date(h.created_at).toLocaleDateString("nl-BE")}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{marginBottom:28}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"clamp(1.6rem,4vw,2.2rem)",letterSpacing:"-0.03em"}}>Wat staat er vandaag op de agenda?</h2>
        <p style={{color:"var(--muted)",marginTop:8,fontSize:"0.9rem"}}>Gooi alles erin — de AI maakt er een slim schema van.</p>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:24,background:"var(--card)",borderRadius:12,padding:4,width:"fit-content"}}>
        {[["structured","📋 Taken"],["freetext","💬 Vrijuit"]].map(([m,l])=>(
          <button key={m} onClick={()=>setMode(m)} style={{background:mode===m?"var(--card2)":"transparent",border:mode===m?"1px solid var(--border)":"1px solid transparent",color:mode===m?"var(--white)":"var(--muted)",borderRadius:8,padding:"8px 16px",fontSize:"0.82rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        <div>
          <label style={{fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8,display:"block"}}>Starttijd</label>
          <input type="time" value={wakeTime} onChange={e=>setWakeTime(e.target.value)} style={{...inp,colorScheme:"dark"}}/>
        </div>
        <div>
          <label style={{fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8,display:"block"}}>Energiepiek</label>
          <select value={energy} onChange={e=>setEnergy(e.target.value)} style={inp}>
            <option value="ochtend">🌅 Ochtend</option>
            <option value="middag">☀️ Middag</option>
            <option value="avond">🌙 Avond</option>
          </select>
        </div>
      </div>
      {mode==="freetext"?(
        <div style={{marginBottom:20}}>
          <label style={{fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8,display:"block"}}>Beschrijf je dag</label>
          <textarea value={freeText} onChange={e=>setFreeText(e.target.value)} placeholder="Bijv: rapport afmaken voor 17u, meeting van 10-11, boodschappen doen..." style={{...inp,minHeight:140,resize:"vertical",lineHeight:1.6}}/>
        </div>
      ):(
        <div style={{marginBottom:20}}>
          <label style={{fontSize:"0.72rem",color:"var(--muted)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8,display:"block"}}>Jouw taken</label>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {tasks.map((task,i)=>(
              <div key={task.id} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"center"}}>
                <input value={task.text} onChange={e=>updateTask(task.id,"text",e.target.value)} placeholder={`Taak ${i+1}...`} style={inp} onFocus={e=>e.target.style.borderColor="rgba(200,255,94,0.35)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
                <select value={task.priority} onChange={e=>updateTask(task.id,"priority",e.target.value)} style={{...inp,width:"auto",color:pColor[task.priority],paddingLeft:10}}>
                  <option value="high">🔴 Hoog</option><option value="medium">🟡 Middel</option><option value="low">🟢 Laag</option>
                </select>
                <select value={task.duration} onChange={e=>updateTask(task.id,"duration",Number(e.target.value))} style={{...inp,width:"auto"}}>
                  {[15,30,45,60,90,120].map(d=><option key={d} value={d}>{d}m</option>)}
                </select>
                {tasks.length>1&&<button onClick={()=>removeTask(task.id)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:20,padding:"0 4px",lineHeight:1}}>×</button>}
              </div>
            ))}
          </div>
          <button onClick={addTask} style={{marginTop:10,background:"none",border:"1px dashed var(--border)",color:"var(--muted)",borderRadius:10,padding:"10px 20px",fontSize:"0.85rem",cursor:"pointer",width:"100%",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}} onMouseOver={e=>{e.currentTarget.style.borderColor=ACCENT;e.currentTarget.style.color=ACCENT;}} onMouseOut={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--muted)";}}>+ Taak toevoegen</button>
        </div>
      )}
      <button onClick={handleSubmit} style={{width:"100%",background:ACCENT,color:"#0a0a0a",border:"none",borderRadius:12,padding:"16px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",cursor:"pointer",boxShadow:"0 0 30px rgba(200,255,94,0.2)",transition:"transform 0.2s"}} onMouseOver={e=>e.currentTarget.style.transform="translateY(-1px)"} onMouseOut={e=>e.currentTarget.style.transform=""}>✦ Genereer mijn dagschema</button>
    </div>
  );
}

function Loading(){
  const[step,setStep]=useState(0);
  const steps=["Taken analyseren...","Prioriteiten bepalen...","Energiepiek verwerken...","Schema optimaliseren...","Bijna klaar..."];
  useEffect(()=>{const iv=setInterval(()=>setStep(s=>Math.min(s+1,steps.length-1)),850);return()=>clearInterval(iv);},[]);
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:28}}>
      <div style={{position:"relative",width:80,height:80}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${ACCENT}`,borderTopColor:"transparent",animation:"spin 0.9s linear infinite"}}/>
        <div style={{position:"absolute",inset:10,borderRadius:"50%",border:"1px solid rgba(200,255,94,0.2)",borderBottomColor:"transparent",animation:"spin 1.4s linear infinite reverse"}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>✦</div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1.1rem",color:ACCENT,marginBottom:8}}>AI aan het werk</div>
        <div style={{color:"var(--muted)",fontSize:"0.9rem"}}>{steps[step]}</div>
      </div>
    </div>
  );
}

function Schedule({schedule,onReset,onRegenerate,user}){
  const[done,setDone]=useState({});
  const[saved,setSaved]=useState(false);
  const toggle=i=>setDone(d=>({...d,[i]:!d[i]}));
  const total=schedule.blocks?.length||0;
  const doneCount=Object.values(done).filter(Boolean).length;
  const progress=total?Math.round((doneCount/total)*100):0;
  useEffect(()=>{
    if(user&&sb){
      const title=`Schema — ${new Date().toLocaleDateString("nl-BE")}`;
      sb.from("schedules").insert({user_id:user.id,title,data:schedule}).then(({error})=>{if(!error)setSaved(true);});
    }
  },[]);
  const tColor=t=>({focus:ACCENT,meeting:"#ffd166",break:"#6bcb77",admin:"#74b3ce"}[t]||"#888");
  const tLabel=t=>({focus:"🎯 Focus",meeting:"👥 Meeting",break:"☕ Pauze",admin:"📋 Admin"}[t]||t);
  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"48px 24px 80px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28,flexWrap:"wrap",gap:12}}>
        <div>
          <Logo/>
          <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"clamp(1.4rem,4vw,2rem)",letterSpacing:"-0.02em",marginTop:16}}>Jouw dagschema</h2>
          <p style={{color:"var(--muted)",fontSize:"0.83rem",marginTop:4}}>
            {new Date().toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long"})}
            {saved&&<span style={{color:ACCENT,marginLeft:8}}>✓ Opgeslagen</span>}
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onRegenerate} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:8,padding:"8px 14px",fontSize:"0.82rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>↺ Herplan</button>
          <button onClick={onReset} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:8,padding:"8px 14px",fontSize:"0.82rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>+ Nieuwe dag</button>
        </div>
      </div>
      <div style={{background:"var(--card)",borderRadius:12,padding:"16px 20px",marginBottom:20,border:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:"0.82rem",color:"var(--muted)"}}>Voortgang vandaag</span>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:ACCENT}}>{progress}%</span>
        </div>
        <div style={{height:6,background:"#1a1a1a",borderRadius:3}}>
          <div style={{height:"100%",width:`${progress}%`,background:ACCENT,borderRadius:3,transition:"width 0.4s ease"}}/>
        </div>
        <div style={{marginTop:8,fontSize:"0.78rem",color:"var(--muted)"}}>{doneCount} van {total} blokken afgerond</div>
      </div>
      {schedule.dailyTip&&(
        <div style={{background:"rgba(200,255,94,0.06)",border:"1px solid rgba(200,255,94,0.18)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",gap:12}}>
          <span style={{fontSize:18,flexShrink:0}}>✦</span>
          <div>
            <div style={{fontSize:"0.72rem",color:ACCENT,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:4}}>AI-tip</div>
            <div style={{fontSize:"0.87rem",color:"#ccc",lineHeight:1.55}}>{schedule.dailyTip}</div>
          </div>
        </div>
      )}
      {schedule.summary&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {schedule.summary.totalFocusTime&&<Tag green>🎯 {schedule.summary.totalFocusTime}</Tag>}
          {schedule.summary.breaks&&<Tag>☕ {schedule.summary.breaks} pauzes</Tag>}
          {schedule.summary.bufferTime&&<Tag>🛡 {schedule.summary.bufferTime} buffer</Tag>}
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {schedule.blocks?.map((block,i)=>(
          <div key={i} onClick={()=>toggle(i)} style={{background:done[i]?"rgba(255,255,255,0.02)":"var(--card)",border:`1px solid ${done[i]?"rgba(255,255,255,0.04)":"var(--border)"}`,borderLeft:`3px solid ${done[i]?"transparent":tColor(block.type)}`,borderRadius:14,padding:"16px 20px",cursor:"pointer",display:"grid",gridTemplateColumns:"56px 1fr 28px",gap:16,alignItems:"center",opacity:done[i]?0.45:1,transition:"all 0.25s"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.88rem"}}>{block.startTime}</div>
              <div style={{fontSize:"0.68rem",color:"var(--muted)",marginTop:2}}>{block.duration}m</div>
            </div>
            <div>
              <div style={{fontWeight:500,fontSize:"0.95rem",textDecoration:done[i]?"line-through":"none",marginBottom:4}}>{block.title}</div>
              {block.description&&<div style={{fontSize:"0.8rem",color:"var(--muted)",lineHeight:1.45,marginBottom:6}}>{block.description}</div>}
              <Tag green={block.type==="focus"}>{tLabel(block.type)}</Tag>
            </div>
            <div style={{fontSize:18,color:done[i]?ACCENT:"var(--muted)",textAlign:"center"}}>{done[i]?"✓":"○"}</div>
          </div>
        ))}
      </div>
      {doneCount===total&&total>0&&(
        <div style={{textAlign:"center",marginTop:40,padding:"36px",background:"rgba(200,255,94,0.05)",border:"1px solid rgba(200,255,94,0.2)",borderRadius:16}}>
          <div style={{fontSize:44,marginBottom:12}}>🎉</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.4rem",color:ACCENT,marginBottom:8}}>Dag voltooid!</div>
          <div style={{color:"var(--muted)",fontSize:"0.9rem"}}>Geweldig gedaan!</div>
        </div>
      )}
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("landing");
  const[user,setUser]=useState(null);
  const[schedule,setSchedule]=useState(null);
  const[lastInput,setLastInput]=useState(null);

  useEffect(()=>{
    if(!sb)return;
    sb.auth.getSession().then(({data:{session}})=>{if(session?.user)setUser(session.user);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogout=async()=>{if(sb)await sb.auth.signOut();setUser(null);setScreen("landing");setSchedule(null);};

  const generate=async(data)=>{
    setLastInput(data);setScreen("loading");
    const userMsg=data.mode==="freetext"
      ?`De gebruiker beschrijft zijn dag: "${data.freeText}"\nStarttijd: ${data.wakeTime}, Energiepiek: ${data.energy}`
      :`De gebruiker heeft deze taken:\n${data.tasks.map(t=>`- ${t.text} (prioriteit: ${t.priority}, duur: ${t.duration} min)`).join("\n")}\nStarttijd: ${data.wakeTime}, Energiepiek: ${data.energy}`;
    const sys=`Je bent een AI dagplanner. Maak een realistisch dagschema. Voeg pauzes en buffers toe. Plan zware taken op het energiepiek-moment. Antwoord UITSLUITEND met geldig JSON:\n{"blocks":[{"startTime":"09:00","duration":90,"title":"Naam","description":"Uitleg","type":"focus"}],"summary":{"totalFocusTime":"2u","breaks":"2","bufferTime":"30m"},"dailyTip":"Tip"}\nTypes: focus,meeting,break,admin`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:userMsg}]})});
      const json=await res.json();
      const raw=(json.content||[]).map(c=>c.text||"").join("");
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setSchedule(parsed);setScreen("schedule");
    }catch(err){
      const[h,m]=data.wakeTime.split(":").map(Number);
      const add=(base,mins)=>{const t=base+mins;return`${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;};
      const s=h*60+m;
      setSchedule({
        blocks:[
          {startTime:add(s,0),duration:15,title:"Dag opstarten",description:"E-mails scannen",type:"admin"},
          {startTime:add(s,15),duration:90,title:data.mode==="structured"&&data.tasks?.[0]?data.tasks[0].text:"Belangrijkste taak",description:"Diep focuswerk",type:"focus"},
          {startTime:add(s,105),duration:15,title:"Korte pauze",description:"Beweeg even",type:"break"},
          {startTime:add(s,120),duration:60,title:data.mode==="structured"&&data.tasks?.[1]?data.tasks[1].text:"Tweede prioriteit",description:"Energie nog hoog",type:"focus"},
          {startTime:add(s,180),duration:60,title:"Lunch",description:"Volledig offline",type:"break"},
          {startTime:add(s,240),duration:45,title:"E-mails & communicatie",description:"Alles in één blok",type:"admin"},
          {startTime:add(s,285),duration:60,title:"Overige taken",description:"Resterende items",type:"focus"},
        ],
        summary:{totalFocusTime:"2u30m",breaks:"2",bufferTime:"15m"},
        dailyTip:"Plan je moeilijkste taak als eerste — je wilskracht is 's ochtends het sterkst."
      });
      setScreen("schedule");
    }
  };

  return(
    <div style={{background:"var(--black)",minHeight:"100vh"}}>
      {screen==="landing"&&<Landing onStart={()=>setScreen("auth")}/>}
      {screen==="auth"&&<AuthScreen onAuth={u=>{setUser(u);setScreen("input");}} onSkip={()=>setScreen("input")}/>}
      {screen==="input"&&<TaskInput onGenerate={generate} user={user} onLogout={handleLogout}/>}
      {screen==="loading"&&<Loading/>}
      {screen==="schedule"&&<Schedule schedule={schedule} user={user} onReset={()=>setScreen("input")} onRegenerate={()=>lastInput&&generate(lastInput)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
